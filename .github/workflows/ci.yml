name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Your_Secure_Password_123!
        ports: [1433:1433]
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Your_Secure_Password_123!' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: ./taskflow-be
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: ./taskflow-ui
        run: npm ci

      - name: Build backend
        working-directory: ./taskflow-be
        run: dotnet build --configuration Release --no-restore

      - name: Build frontend
        working-directory: ./taskflow-ui
        run: npm run build --if-present

      - name: Test backend
        working-directory: ./taskflow-be
        env:
          ConnectionStrings__DefaultConnection: Server=localhost;Database=TaskFlowDb;User Id=sa;Password=Your_Secure_Password_123!;TrustServerCertificate=True;
        run: dotnet test --configuration Release --no-build --verbosity normal